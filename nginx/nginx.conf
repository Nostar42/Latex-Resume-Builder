# nginx reverse proxy for LaTeX Resume Builder
# Run from the project root: nginx -p <project_root> -c nginx/nginx.conf
# Proxies :5000 (public) -> :8000 (Uvicorn/FastAPI)

worker_processes 1;

pid        temp/nginx.pid;
error_log  temp/nginx_error.log  warn;

events {
    worker_connections 512;
}

http {
    access_log  temp/nginx_access.log;

    # Compress JSON and HTML responses
    gzip            on;
    gzip_min_length 500;
    gzip_types      text/plain application/json;

    # Long timeouts: AI generation + LaTeX compile can take several minutes.
    # proxy_read_timeout must exceed the LLM read timeout (600 s) so nginx
    # does not close the connection before FastAPI gets the model response.
    proxy_read_timeout    660s;
    proxy_send_timeout    660s;
    proxy_connect_timeout 5s;
    client_body_timeout   30s;
    send_timeout          60s;

    # Keep persistent connections to Uvicorn
    upstream app {
        server 127.0.0.1:8000;
        keepalive 32;
        keepalive_requests 100;
    }

    # ── Rate limiting ───────────────────────────────────────────────────────
    # Three tiers, keyed by client IP (10 MB shared zone ~ 160k IPs each).
    #
    # chat    — AI inference + compile, the most expensive path.
    #           10 req/min lets a user make one edit every ~6 s comfortably
    #           while blocking scripts that hammer it.
    #
    # compile — template switch / source recompile / reset.
    #           20 req/min; a user won't legitimately exceed this.
    #
    # api     — lightweight reads (models, templates list, PDF, source GET).
    #           60 req/min; plenty for normal browser behaviour.
    #
    limit_req_zone $binary_remote_addr zone=chat:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=compile:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;

    # Log rate-limit rejections at warn level, return 429 (not the default 503)
    limit_req_log_level warn;
    limit_req_status    429;

    # Shared proxy headers -- used in every location block below
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    Connection        "";

    server {
        listen      5000;
        server_name localhost;

        client_max_body_size 10m;

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"            always;
        add_header X-Frame-Options         "SAMEORIGIN"         always;
        add_header Referrer-Policy         "strict-origin"      always;

        # ── AI chat (most expensive: LLM + compile) ──────────────────────
        # burst=5 lets a user queue up to 5 rapid edits; after that nginx
        # holds excess requests until a slot opens (nodelay drops them instead
        # of queuing -- cleaner for a long-poll AI endpoint).
        location = /api/chat {
            limit_req zone=chat burst=5 nodelay;
            proxy_pass http://app;
        }

        # ── GET /api/source is a lightweight read (api zone) ────────────
        # The regex block below would otherwise rate-limit it at compile
        # tier (20/min). Exact location takes priority over regex.
        # POST /api/source still hits the compile zone via the regex below
        # after nginx 1.7.x method routing; FastAPI's internal _RL_COMPILE
        # also enforces 20/min regardless of what nginx passes through.
        location = /api/source {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app;
        }

        # ── Compile-triggering writes ────────────────────────────────────
        # POST /api/template and POST /api/reset run pdflatex.
        location ~ ^/api/(template|reset)$ {
            limit_req zone=compile burst=5 nodelay;
            proxy_pass http://app;
        }

        # ── Everything else (reads, page load, model picker) ────────────
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app;
        }
    }
}
